swagger: '2.0'
info:
  version: 1.0.0
  title: HTML Injection 
  description: |
    <!-- CSS for advanced glitch/terminal effects -->
    <style>
      @keyframes glitch {
        0% {
          transform: translate(0);
          text-shadow: -2px 0 #ff0000, 2px 2px #00ff00;
        }
        20% {
          transform: translate(-2px, 2px);
          text-shadow: 1px -1px #ff0000, -1px 1px #00ff00;
        }
        40% {
          transform: translate(-2px, -2px);
          text-shadow: 1px 0 #ff0000, -1px -1px #00ff00;
        }
        60% {
          transform: translate(2px, 2px);
          text-shadow: -1px 0 #ff0000, 1px 1px #00ff00;
        }
        80% {
          transform: translate(2px, -2px);
          text-shadow: -1px -1px #ff0000, 1px 0 #00ff00;
        }
        100% {
          transform: translate(0);
          text-shadow: -2px 0 #ff0000, 2px 2px #00ff00;
        }
      }
      
      @keyframes glitchBg {
        0% {
          background-position: 0 0;
          filter: hue-rotate(0deg);
        }
        10% {
          background-position: 5px 0;
        }
        20% {
          background-position: -5px 0;
        }
        30% {
          background-position: 15px 0;
        }
        40% {
          background-position: 5px 0;
          filter: hue-rotate(90deg);
        }
        50% {
          background-position: -25px 0;
        }
        60% {
          background-position: -15px 0;
        }
        70% {
          background-position: 0 -5px;
        }
        80% {
          background-position: -5px 5px;
        }
        90% {
          background-position: 10px 10px;
          filter: hue-rotate(180deg);
        }
        100% {
          background-position: 0 0;
          filter: hue-rotate(0deg);
        }
      }
      
      @keyframes scanline {
        0% {
          transform: translateY(-100%);
        }
        100% {
          transform: translateY(100%);
        }
      }
      
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      
      @keyframes rotate3d {
        0% { transform: perspective(1000px) rotateX(0deg) rotateY(0deg); }
        50% { transform: perspective(1000px) rotateX(15deg) rotateY(15deg); }
        100% { transform: perspective(1000px) rotateX(0deg) rotateY(0deg); }
      }
      
      @keyframes matrix {
        0% { text-shadow: 0 0 0 #0f0; }
        50% { text-shadow: 0 0 10px #0f0, 0 0 20px #0f0; }
        100% { text-shadow: 0 0 0 #0f0; }
      }
      
      @keyframes flicker {
        0% { opacity: 0.8; }
        5% { opacity: 0.5; }
        10% { opacity: 0.8; }
        15% { opacity: 0.4; }
        20% { opacity: 0.7; }
        25% { opacity: 0.9; }
        30% { opacity: 0.7; }
        35% { opacity: 0.9; }
        40% { opacity: 0.7; }
        45% { opacity: 0.9; }
        50% { opacity: 0.8; }
        55% { opacity: 0.7; }
        60% { opacity: 0.9; }
        65% { opacity: 0.8; }
        70% { opacity: 0.6; }
        75% { opacity: 0.9; }
        80% { opacity: 0.7; }
        85% { opacity: 0.8; }
        90% { opacity: 0.6; }
        95% { opacity: 0.9; }
        100% { opacity: 0.8; }
      }
      
      /* Base style for the hacked content */
      #hackedContent {
        position: relative;
        overflow: hidden;
        text-align: center;
        background-color: #000;
        color: #0f0;
        padding: 20px;
        border-radius: 10px;
        font-family: 'Courier New', monospace;
        border: 1px solid #0f0;
        box-shadow: 0 0 20px #0f0, inset 0 0 10px #0f0;
        animation: flicker 10s infinite linear;
        background-image: linear-gradient(rgba(0,20,0,0.1) 50%, transparent 50%);
        background-size: 100% 4px;
      }
      
      /* Add noise background */
      #hackedContent::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIAAAAyAQMAAAAk8RryAAAABlBMVEUAAAD///+l2Z/dAAAAAnRSTlP/AOW3MEoAAAAZSURBVBjTY2AY9mBU0AgImPYwIrlMexgAAPcmBYbqSLPPAAAAAElFTkSuQmCC");
        opacity: 0.06;
        animation: glitchBg 10s infinite;
        pointer-events: none;
        z-index: 1;
      }
      
      /* Add scanline effect */
      #hackedContent::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 5px;
        background-color: rgba(0, 255, 0, 0.15);
        animation: scanline 4s linear infinite;
        pointer-events: none;
        z-index: 2;
      }
      
      /* 3D glitch title */
      .glitch-title {
        position: relative;
        color: #ff0000;
        animation: glitch 5s infinite, rotate3d 10s infinite;
        transform-style: preserve-3d;
        padding: 30px;
        text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000;
      }
      
      /* Blinking terminal cursor */
      .terminal-cursor {
        display: inline-block;
        width: 10px;
        height: 20px;
        background: #0f0;
        margin-left: 5px;
        animation: blink 1s step-end infinite;
      }
      
      /* Matrix style text */
      .matrix-text {
        font-family: 'Courier New', monospace;
        font-size: 14px;
        color: #0f0;
        text-shadow: 0 0 5px #0f0;
        animation: matrix 2s infinite;
      }
      
      /* 3D rotating logo */
      .logo-3d {
        transform-style: preserve-3d;
        perspective: 1000px;
        animation: rotate3d 15s infinite linear;
        padding: 20px;
      }
      
      /* Digital distortion effect */
      .digital-distort {
        display: inline-block;
        position: relative;
        color: #00ff00;
      }
      
      .digital-distort::before,
      .digital-distort::after {
        content: attr(data-text);
        position: absolute;
        top: 0;
        left: 0;
        z-index: -1;
      }
      
      .digital-distort::before {
        color: #ff00ff;
        animation: glitch 0.4s infinite;
        clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
        transform: translate(-2px, 0);
      }
      
      .digital-distort::after {
        color: #00ffff;
        animation: glitch 0.5s infinite;
        clip-path: polygon(0 60%, 100% 60%, 100% 100%, 0 100%);
        transform: translate(2px, 0);
      }
      
      /* Terminal typing effect container */
      .terminal-container {
        background: rgba(0, 0, 0, 0.7);
        border-radius: 5px;
        border: 1px solid #0f0;
        padding: 10px;
        text-align: left;
        font-family: 'Courier New', monospace;
        position: relative;
        margin: 20px auto;
        width: 80%;
        box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
      }
      
      /* Terminal header */
      .terminal-header {
        border-bottom: 1px solid #0f0;
        padding-bottom: 5px;
        margin-bottom: 10px;
        display: flex;
        justify-content: space-between;
      }
      
      .terminal-circle {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        display: inline-block;
        margin-right: 5px;
      }
      
      .terminal-red { background-color: #ff5f56; }
      .terminal-yellow { background-color: #ffbd2e; }
      .terminal-green { background-color: #27c93f; }
      
      .terminal-title {
        color: #0f0;
        text-align: center;
        flex-grow: 1;
        font-size: 12px;
      }
      
      /* Command line prompt */
      .terminal-prompt {
        color: #0f0;
        margin-bottom: 5px;
      }
      
      .terminal-prompt-user {
        color: #00ff00;
      }
      
      .terminal-prompt-host {
        color: #0099ff;
      }
      
      .terminal-prompt-path {
        color: #ffcc00;
      }
    </style>

    <div id="hackedContent">
      <h1 class="glitch-title"> Authenticate to the API Documentation by clicking on below link </h1>
      <a href="//evil.com">Click here</a>
    </div>
