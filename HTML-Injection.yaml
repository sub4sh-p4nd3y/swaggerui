swagger: '2.0'
info:
  version: 1.0.0
  title: Login Page
  description: '<div style="font-family: Arial; background-color: #f2f2f2; height: 100vh; display: flex; align-items: center; justify-content: center;">

  <div style="width: 300px; padding: 20px; background-color: white; border-radius: 5px; box-shadow: 0 0 10px #ccc;">
    
    <h2 style="text-align: center;">Login</h2>
     <div style="background: white; padding: 20px; width: 300px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1);">
    
    <h2 style="text-align: center;">Login</h2>

    <!-- Textarea as username/email -->
    <textarea rows="3" placeholder="Enter Username or Email"
      style="width: 100%; padding: 10px; margin: 8px 0; border-radius: 5px; border: 1px solid #ccc;"></textarea>

    <!-- Password input -->
    <input type="password" placeholder="Enter Password"
      style="width: 100%; padding: 10px; margin: 8px 0; border-radius: 5px; border: 1px solid #ccc;">

    <!-- Optional textarea -->
    <textarea rows="2" placeholder="Comments (optional)"
      style="width: 100%; padding: 10px; margin: 8px 0; border-radius: 5px; border: 1px solid #ccc;"></textarea>

    <!-- Button -->
    <button 
      style="width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer;">
      Login
    </button>

  </div>
  </div>
</div>'
paths:
  /:
    post:
      responses:
        '200':
          description: Login successful
